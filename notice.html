<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소식 | 법률사무소 탄하</title>
    <link rel="icon" href="t.png" type="image/png">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&family=Noto+Sans+KR:wght@600&family=Raleway:wght@400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body class="page-subpage">

    <header id="main-header" class="is-subpage">
        <nav class="navbar">
            <a href="index.html" class="logo" aria-label="법률사무소 탄하">
                <img src="logo.png" alt="법률사무소 탄하 TANHA LAW OFFICE" class="logo-img">
            </a>
            <ul class="nav-links">
                <li><a href="index.html#about">Professionals</a></li>
                <li><a href="index.html#consultation">Consultation</a></li>
                <li><a href="cases.html">Cases</a></li>
                <li><a href="notices.html" class="is-current">Notice</a></li>
                <li><a href="index.html#contact">Contact</a></li>
                <li id="admin-menu" hidden><a href="#" data-action="open-consults">상담 조회</a></li>
                <li id="auth-menu"><a href="#" data-action="open-login">Login</a></li>
            </ul>
            <button class="nav-toggle" aria-label="메뉴 열기">
                <span></span><span></span>
            </button>
        </nav>
    </header>

    <main class="subpage-main">
        <article id="notice-article" class="notice-detail">
            <div class="container container-narrow">
                <div class="notice-detail-loading">불러오는 중입니다.</div>
            </div>
        </article>

        <div class="notice-foot">
            <div class="container container-narrow">
                <a href="notices.html" class="btn btn-outline">← 소식 목록으로 돌아가기</a>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <a href="http://pf.kakao.com/_xbqhMn/chat" target="_blank" rel="noopener" class="footer-kakao">
                <svg class="footer-kakao-icon" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
                    <path fill="#3C1E1E" d="M12 3C6.48 3 2 6.58 2 11c0 2.86 1.87 5.36 4.68 6.78L5.5 21.5l4.32-2.55c.7.1 1.43.15 2.18.15 5.52 0 10-3.58 10-8S17.52 3 12 3z"/>
                </svg>
                <span>카카오톡 상담</span>
            </a>
            <div class="footer-meta">
                <div class="footer-links">
                    <a href="privacy.html" class="is-strong">개인정보처리방침</a>
                </div>
                <p>&copy; 2025 TANHA LAW OFFICE. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <div id="login-modal" class="modal" aria-hidden="true">
        <div class="modal-backdrop" data-action="close-modal" data-target="login-modal"></div>
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="login-title">
            <button class="modal-close" data-action="close-modal" data-target="login-modal" aria-label="닫기">×</button>
            <h3 id="login-title" class="modal-title">관리자 로그인</h3>
            <form id="auth-form" class="modal-form" novalidate>
                <div class="field">
                    <label for="auth-email">이메일</label>
                    <input type="email" id="auth-email" required>
                </div>
                <div class="field">
                    <label for="auth-password">비밀번호</label>
                    <input type="password" id="auth-password" required>
                </div>
                <button type="submit" class="btn btn-primary">로그인</button>
            </form>
        </div>
    </div>

    <div id="lightbox" class="lightbox" aria-hidden="true" data-action="close-lightbox">
        <button class="lightbox-close" data-action="close-lightbox" aria-label="닫기">×</button>
        <img id="lightbox-img" alt="">
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
